<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PSICOCOPY™ Master System — El sistema de copy viral para Facebook. Manual interactivo profesional." />
  <title>PSICOCOPY™ · Master System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=55" />
</head>
<body>

  <!-- ============ PORTADA / COVER ============ -->
  <section id="cover" class="cover" aria-label="Portada">
    <div class="cover__bg" aria-hidden="true">
      <span class="orb orb--1"></span>
      <span class="orb orb--2"></span>
      <span class="orb orb--3"></span>
      <div class="grid-lines"></div>
    </div>

    <div class="cover__content">
      <p class="cover__eyebrow">Edición Profesional</p>
      <h1 class="cover__title">
        PSICO<span class="grad">COPY</span><sup class="tm">™</sup>
      </h1>
      <p class="cover__subtitle">El Sistema de Copy Viral para Facebook</p>

      <div class="cover__stats">
        <div class="stat"><strong data-count="150">0</strong><span>páginas equivalentes</span></div>
        <div class="stat"><strong data-count="1000">0</strong><span>ejemplos</span></div>
        <div class="stat"><strong data-count="40">0</strong><span>gatillos mentales</span></div>
      </div>

      <button id="startBtn" class="btn btn--primary btn--lg">
        Comenzar
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
      <p class="cover__hint">Master System · Interactivo · Sin instalar nada</p>
    </div>
  </section>

  <!-- ============ APP ============ -->
  <div id="app" class="app" hidden>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar__brand">
        <span class="logo">PSICO<b>COPY</b><sup>™</sup></span>
        <button id="closeSidebar" class="icon-btn only-mobile" aria-label="Cerrar menú">✕</button>
      </div>

      <div class="sidebar__search">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="search" placeholder="Buscar (ej. ansiedad)…" autocomplete="off" />
      </div>

      <nav id="nav" class="nav" aria-label="Navegación principal"><!-- generado por JS --></nav>

      <div class="sidebar__footer">
        <span class="badge">v1.0 · Base extensible</span>
      </div>
    </aside>

    <div id="overlay" class="overlay" hidden></div>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <button id="openSidebar" class="icon-btn only-mobile" aria-label="Abrir menú">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div id="breadcrumb" class="breadcrumb">Inicio</div>
        <div class="topbar__actions">
          <button id="themeToggle" class="icon-btn" aria-label="Cambiar tema" title="Modo claro / oscuro">
            <span class="theme-icon theme-icon--dark">🌙</span>
            <span class="theme-icon theme-icon--light">☀️</span>
          </button>
        </div>
      </header>

      <main id="content" class="content" tabindex="-1"><!-- generado por JS --></main>

      <footer class="appfoot">
        <span>PSICOCOPY™ Master System</span>
        <span>·</span>
        <span>Hecho para crecer contigo</span>
      </footer>
    </div>
  </div>

  <script src="js/data.js?v=55"></script>
  <script src="js/app.js?v=55"></script>
</body>
</html>
